<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestVault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-frame">
        <header class="app-header">
            <p class="eyebrow">Personal Progress Library</p>
            <h1>QuestVault</h1>
            <p class="tagline">Save a different question journey for each topic.</p>
        </header>

        <div class="app-layout">
            <aside class="project-panel">
                <div class="panel-heading">
                    <h2>Files</h2>
                    <button id="newFileBtn" type="button">New File</button>
                </div>
                <div id="projectList" class="project-list"></div>
            </aside>

            <main class="tracker-panel">
                <div class="tracker-top">
                    <h2 id="projectTitle">DSA Tracker</h2>
                    <div class="progress-wrap">
                        <span id="percentage">0% Completed</span>
                        <div class="progress-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <span>Solved</span>
                        <strong><span id="solved">0</span>/<span id="total">100</span></strong>
                    </div>
                    <div class="stat-card">
                        <span>Remaining</span>
                        <strong id="remaining">100</strong>
                    </div>
                    <div class="stat-card">
                        <span>Status</span>
                        <strong id="statusText">In Progress</strong>
                    </div>
                </div>

                <div class="controls">
                    <button id="saveBtn" type="button">Save Progress</button>
                    <button id="continueBtn" type="button">Continue</button>
                    <button id="addBlocksBtn" type="button">Add Blocks</button>
                    <button id="removeBlocksBtn" type="button">Remove Blocks</button>
                    <button id="renameBtn" type="button">Rename</button>
                    <button id="nextBtn" type="button">Next Unsolved</button>
                    <button id="resetBtn" type="button">Reset</button>
                </div>

                <div class="quick-tools">
                    <input id="jumpInput" type="number" min="1" placeholder="Question no.">
                    <button id="jumpBtn" type="button">Jump</button>
                    <button id="markAllBtn" type="button">Mark All</button>
                    <button id="clearSolvedBtn" type="button">Clear Solved</button>
                </div>

                <div class="frame">
                    <div id="emptyState" class="empty-state">
                        <strong>No file selected</strong>
                        <span>Create a new file to start tracking.</span>
                    </div>
                    <div id="completionBurst" class="completion-burst">Completed</div>
                    <div id="container"></div>
                </div>

            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
